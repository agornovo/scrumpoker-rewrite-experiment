name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  backend:
    name: Backend Tests (Java ${{ matrix.java }})
    runs-on: ubuntu-latest

    permissions:
      contents: read

    strategy:
      matrix:
        java: [ '17', '21' ]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK ${{ matrix.java }}
      uses: actions/setup-java@v4
      with:
        java-version: ${{ matrix.java }}
        distribution: temurin
        cache: maven

    - name: Run backend tests
      working-directory: backend
      run: mvn verify -q

    - name: Upload backend coverage report
      if: matrix.java == '17'
      uses: actions/upload-artifact@v4
      with:
        name: backend-coverage-report
        path: backend/target/site/jacoco/
        retention-days: 30

  frontend:
    name: Frontend Tests (Node ${{ matrix.node }})
    runs-on: ubuntu-latest

    permissions:
      contents: read

    strategy:
      matrix:
        node: [ '20', '22', '24' ]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js ${{ matrix.node }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node }}
        cache: npm
        cache-dependency-path: frontend/package-lock.json

    - name: Install frontend dependencies
      working-directory: frontend
      run: npm ci

    - name: Run frontend tests with coverage
      working-directory: frontend
      run: npm run test:coverage -- --run

    - name: Upload frontend coverage report
      if: matrix.node == '20'
      uses: actions/upload-artifact@v4
      with:
        name: frontend-coverage-report
        path: frontend/coverage/
        retention-days: 30

  e2e:
    name: E2E Tests (Docker + Playwright)
    runs-on: ubuntu-latest
    needs: [ backend, frontend ]

    permissions:
      contents: read

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: npm
        cache-dependency-path: package-lock.json

    - name: Install E2E dependencies
      run: npm ci

    - name: Install Playwright browsers
      run: npx playwright install --with-deps chromium

    - name: Build Docker image
      run: docker build -t scrumpoker:e2e .

    - name: Start application container
      run: docker run -d --name scrumpoker-e2e -p 8080:8080 scrumpoker:e2e

    - name: Wait for application to be ready
      run: |
        echo "Waiting for application to start..."
        timeout 90 bash -c '
          until curl -sf http://localhost:8080/health; do
            echo "  ...not ready yet"
            sleep 3
          done
        '
        echo "Application is ready"
        curl -s http://localhost:8080/health
        curl -s http://localhost:8080/ready

    - name: Run E2E tests
      run: npm run test:e2e
      env:
        BASE_URL: http://localhost:8080

    - name: Upload Playwright report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30

    - name: Upload Playwright test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-results
        path: playwright-results/
        retention-days: 30

    - name: Upload E2E screenshots
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: e2e-screenshots
        path: docs/screenshots/
        retention-days: 30

    - name: Stop application container
      if: always()
      run: docker stop scrumpoker-e2e || true

